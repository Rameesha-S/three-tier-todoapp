name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Jenkins Job
        run: |
          # Added -f to fail the action if Jenkins returns an error (like 401)
          # Added -sS to keep the logs clean
          curl -f -sS -X POST "http://localhost:8080/job/myapp-deploy/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_JOB_TOKEN }}"
