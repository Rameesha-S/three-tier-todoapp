



<!DOCTYPE html>
<html>
<head>
    <title>My ToDo App</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; }
        input, textarea, button { padding: 10px; margin: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { cursor: pointer; background-color: #007bff; color: white; border: none; }
        button:hover { background-color: #0056b3; }
        .task-item { border-bottom: 1px solid #eee; padding: 10px; margin-bottom: 10px; }
        .task-title { font-weight: bold; cursor: pointer; }
        .task-desc { color: #666; font-size: 0.9em; margin-top: 5px; }
        .completed { text-decoration: line-through; color: #888; }
        .task-actions { margin-top: 10px; }
        .task-actions button { margin-right: 10px; padding: 5px 10px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>
        <div>
            <h3>Add New Task</h3>
            <input type="text" id="title" placeholder="Task Title" required>
            <textarea id="description" placeholder="Task Description" rows="3"></textarea>
            <button onclick="createTask()">Add Task</button>
        </div>
        <hr>
        <div id="tasks-list">
            <p>Loading tasks...</p>
        </div>
    </div>

    <script>
        // This is the address of our Backend API (the APP server)
        const apiBaseUrl = "http://192.168.215.9:8081/api";

        // Fetch and display all tasks when the page loads
        async function loadTasks() {
            try {
                const response = await fetch(`${apiBaseUrl}/tasks`);
                if (!response.ok) throw new Error('Network response was not ok');
                const tasks = await response.json();
                displayTasks(tasks);
            } catch (error) {
                document.getElementById('tasks-list').innerHTML = '<p>Error loading tasks. Is the backend server running?</p>';
                console.error('Error:', error);
            }
        }

        // Display the list of tasks
        function displayTasks(tasks) {
            const tasksDiv = document.getElementById('tasks-list');
            if (tasks.length === 0) {
                tasksDiv.innerHTML = '<p>No tasks yet. Create one!</p>';
                return;
            }

            let html = '';
            for (const task of tasks) {
                const statusClass = task.is_completed ? 'completed' : '';
                html += `
                    <div class="task-item" data-id="${task.id}">
                        <div class="task-title ${statusClass}" onclick="toggleTask(${task.id}, ${!task.is_completed})">
                            ${task.title}
                        </div>
                        <div class="task-desc">${task.description || ''}</div>
                        <div class="task-actions">
                            <button onclick="editTask(${task.id})">Edit</button>
                            <button onclick="deleteTask(${task.id})">Delete</button>
                        </div>
                    </div>
                `;
            }
            tasksDiv.innerHTML = html;
        }

        // Create a new task
        async function createTask() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;

            if (!title) {
                alert('Please enter a task title');
                return;
            }

            try {
                const response = await fetch(`${apiBaseUrl}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                if (!response.ok) throw new Error('Failed to create task');
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                await loadTasks();
            } catch (error) {
                alert('Error creating task');
                console.error('Error:', error);
            }
        }

        // Toggle task completion status
        async function toggleTask(id, completed) {
            try {
                const response = await fetch(`${apiBaseUrl}/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ is_completed: completed })
                });
                if (!response.ok) throw new Error('Failed to update task');
                await loadTasks();
            } catch (error) {
                alert('Error updating task');
                console.error('Error:', error);
            }
        }

        // Delete a task
        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            try {
                const response = await fetch(`${apiBaseUrl}/tasks/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Failed to delete task');
                await loadTasks();
            } catch (error) {
                alert('Error deleting task');
                console.error('Error:', error);
            }
        }

        // Simple edit function (prompts for new title)
        async function editTask(id) {
            const newTitle = prompt('Enter new title for the task:');
            if (newTitle && newTitle.trim()) {
                try {
                    const response = await fetch(`${apiBaseUrl}/tasks/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: newTitle })
                    });
                    if (!response.ok) throw new Error('Failed to update task');
                    await loadTasks();
                } catch (error) {
                    alert('Error updating task');
                    console.error('Error:', error);
                }
            }
        }

        // Load tasks when the page loads
        window.onload = loadTasks;
    </script>
</body>
</html>
